services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: caixa-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ngP@ssw0rd!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      # mssql-tools18 já vem na imagem 2022. -C confia no certificado (tools18 criptografa por padrão).
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Inicialização do banco (cria DB, tabelas e login). Executa uma vez e sai.
  sql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: caixa-sql-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./SQL_CREATE_DATABASE.sql:/scripts/SQL_CREATE_DATABASE.sql
    entrypoint: /bin/bash -c "/opt/mssql-tools/bin/sqlcmd -S sqlserver,1433 -U sa -P 'Str0ngP@ssw0rd!' -i /scripts/SQL_CREATE_DATABASE.sql"
    restart: "no"

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: caixa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Transactions API (publica TransactionCreatedEvent no RabbitMQ)
  transactions-api:
    build:
      context: .
      dockerfile: services/Transactions.API/Dockerfile
    container_name: caixa-transactions-api
    depends_on:
      sqlserver:
        condition: service_healthy
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CaixaDb;User Id=sa;Password=Str0ngP@ssw0rd!;TrustServerCertificate=True;Encrypt=False;"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Consolidation API (consome TransactionCreatedEvent do RabbitMQ)
  consolidation-api:
    build:
      context: .
      dockerfile: services/Consolidation.API/Dockerfile
    container_name: caixa-consolidation-api
    depends_on:
      sqlserver:
        condition: service_healthy
      sql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CaixaDb;User Id=sa;Password=Str0ngP@ssw0rd!;TrustServerCertificate=True;Encrypt=False;"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlserver_data:
  rabbitmq_data:

networks:
  default:
    name: caixa-network
